<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b95ab"/>
    </marker>
  </defs>
  <rect width="960" height="640" rx="14" fill="#0b0e14"/>
  <text x="480" y="36" text-anchor="middle" fill="#e6ebf5" font-size="20" font-weight="700">Every tick, one decision</text>

  <!-- start -->
  <rect x="390" y="56" width="180" height="42" rx="21" fill="#16233c" stroke="#4f8cff" stroke-width="2"/>
  <text x="480" y="83" text-anchor="middle" fill="#e6ebf5" font-size="13.5" font-weight="600">tick (every minute)</text>

  <!-- in session -->
  <polygon points="480,118 585,158 480,198 375,158" fill="#131826" stroke="#232b3d" stroke-width="2"/>
  <text x="480" y="153" text-anchor="middle" fill="#e6ebf5" font-size="12.5">market open +</text>
  <text x="480" y="170" text-anchor="middle" fill="#e6ebf5" font-size="12.5">weekday?</text>
  <line x1="480" y1="98" x2="480" y2="118" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>
  <line x1="375" y1="158" x2="200" y2="158" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>
  <rect x="90" y="137" width="110" height="42" rx="9" fill="#0f1420" stroke="#2a3a5f"/>
  <text x="145" y="163" text-anchor="middle" fill="#8b95ab" font-size="12.5">idle</text>
  <text x="360" y="150" fill="#8b95ab" font-size="11">no</text>

  <!-- holding -->
  <polygon points="480,218 590,258 480,298 370,258" fill="#131826" stroke="#232b3d" stroke-width="2"/>
  <text x="480" y="253" text-anchor="middle" fill="#e6ebf5" font-size="12.5">holding a</text>
  <text x="480" y="270" text-anchor="middle" fill="#e6ebf5" font-size="12.5">position?</text>
  <line x1="480" y1="198" x2="480" y2="218" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>

  <!-- manage branch (right) -->
  <line x1="590" y1="258" x2="680" y2="258" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>
  <text x="600" y="250" fill="#8b95ab" font-size="11">yes</text>
  <rect x="680" y="212" width="250" height="92" rx="10" fill="#16233c" stroke="#4f8cff" stroke-width="2"/>
  <text x="805" y="238" text-anchor="middle" fill="#e6ebf5" font-size="13" font-weight="600">manage the trail</text>
  <text x="805" y="258" text-anchor="middle" fill="#8b95ab" font-size="11.5">peak ↑ → stop ratchets ↑ only</text>
  <text x="805" y="275" text-anchor="middle" fill="#8b95ab" font-size="11.5">options: expiry guard closes ≤ N DTE</text>
  <text x="805" y="293" text-anchor="middle" fill="#ff5c6c" font-size="11.5" font-weight="600">price ≤ stop → SELL ALL</text>

  <!-- gates -->
  <line x1="480" y1="298" x2="480" y2="322" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>
  <text x="492" y="315" fill="#8b95ab" font-size="11">no — flat</text>
  <rect x="330" y="322" width="300" height="88" rx="10" fill="#131826" stroke="#232b3d" stroke-width="2"/>
  <text x="480" y="345" text-anchor="middle" fill="#e6ebf5" font-size="13" font-weight="600">entry gates (all deterministic)</text>
  <text x="480" y="365" text-anchor="middle" fill="#8b95ab" font-size="11.5">no entry yet today · no sale today (T+1 guard)</text>
  <text x="480" y="382" text-anchor="middle" fill="#8b95ab" font-size="11.5">warm-up done · daily loss breaker not tripped</text>
  <text x="480" y="399" text-anchor="middle" fill="#8b95ab" font-size="11.5">settled cash available</text>

  <!-- candidates -->
  <line x1="480" y1="410" x2="480" y2="432" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>
  <rect x="330" y="432" width="300" height="58" rx="10" fill="#131826" stroke="#232b3d" stroke-width="2"/>
  <text x="480" y="456" text-anchor="middle" fill="#e6ebf5" font-size="13" font-weight="600">build candidates from your universe</text>
  <text x="480" y="475" text-anchor="middle" fill="#8b95ab" font-size="11.5">big movers on the day (+ red ones if puts on), with beta</text>

  <!-- AI pick -->
  <line x1="480" y1="490" x2="480" y2="512" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>
  <rect x="330" y="512" width="300" height="58" rx="10" fill="#2a2133" stroke="#b07df0" stroke-width="2"/>
  <text x="480" y="536" text-anchor="middle" fill="#e6ebf5" font-size="13" font-weight="600">🧠 AI picks ONE trade — or passes</text>
  <text x="480" y="555" text-anchor="middle" fill="#8b95ab" font-size="11.5">symbol · direction · shares-or-contract · conviction</text>

  <!-- outcomes -->
  <line x1="330" y1="541" x2="200 " y2="541" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>
  <rect x="60" y="520" width="140" height="42" rx="9" fill="#0f1420" stroke="#2a3a5f"/>
  <text x="130" y="546" text-anchor="middle" fill="#8b95ab" font-size="12">pass → try tomorrow</text>
  <text x="255" y="533" fill="#8b95ab" font-size="11">low conviction / pass</text>

  <line x1="630" y1="541" x2="700" y2="541" stroke="#8b95ab" stroke-width="2" marker-end="url(#a)"/>
  <text x="640" y="533" fill="#8b95ab" font-size="11">clears gate</text>
  <rect x="700" y="500" width="230" height="86" rx="10" fill="#12211b" stroke="#2ecc8f" stroke-width="2"/>
  <text x="815" y="524" text-anchor="middle" fill="#e6ebf5" font-size="13" font-weight="600">BUY (sized by your profile)</text>
  <text x="815" y="544" text-anchor="middle" fill="#8b95ab" font-size="11.5">shares: dollar-based market buy</text>
  <text x="815" y="561" text-anchor="middle" fill="#8b95ab" font-size="11.5">option: profile picks Δ + expiry window</text>
  <text x="815" y="578" text-anchor="middle" fill="#2ecc8f" font-size="11.5" font-weight="600">→ then the trail takes over</text>

  <text x="480" y="620" text-anchor="middle" fill="#5c6579" font-size="11.5">One entry per day, max. The stop (or the expiry guard) is the only exit.</text>
</svg>
